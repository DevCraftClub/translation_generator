name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  verify:
    runs-on: homeserver
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Compile sources
        run: python -m compileall -q main.py assets app scripts

      - name: CLI smoke test
        run: python main.py --help

  build-linux:
    needs: verify
    runs-on: homeserver
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        run: pyinstaller --onefile --name _parser --console main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: parser-linux
          path: dist/_parser
